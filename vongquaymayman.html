<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vòng Quay May Mắn</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; overflow-x: hidden; background: #1a0000; }
  #game-container {
    min-height: 100vh;
    background: linear-gradient(135deg, #ff4e50 0%, #f9a825 50%, #ff6b6b 100%);
    display: flex; flex-direction: column;
    align-items: center; padding: 20px;
    position: relative; overflow: hidden;
  }
  .title-box {
    background: linear-gradient(135deg, #8B0000, #C0392B);
    border: 3px solid #FFD700; border-radius: 12px;
    padding: 10px 40px; margin-bottom: 12px;
    text-align: center;
    box-shadow: 0 4px 30px rgba(255,215,0,0.4), 0 0 60px rgba(255,50,50,0.3);
  }
  .title-box h1 { color: #FFD700; font-size: 26px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px #FFD700, 2px 2px 4px rgba(0,0,0,0.5); }
  .subtitle { color: #fff; font-size: 12px; margin-top: 4px; }
  .top-row { display: flex; align-items: center; gap: 20px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }

  /* Chances box */
  .chances-box {
    background: #fff; border-radius: 50%;
    width: 110px; height: 110px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 20px rgba(255,215,0,0.5);
    border: 4px solid #FFD700;
  }
  .chances-box .lbl { font-size: 10px; color: #999; text-align: center; }
  .chances-box .num { font-size: 42px; font-weight: 900; color: #C0392B; line-height: 1; }
  .chances-box .lbl2 { font-size: 11px; color: #555; }

  /* My prize box */
  .myprizebox {
    background: linear-gradient(135deg, #7B1FA2, #4A148C);
    border: 3px solid #FFD700; border-radius: 14px;
    padding: 12px 20px; text-align: center; min-width: 160px;
    box-shadow: 0 4px 20px rgba(123,31,162,0.5), 0 0 30px rgba(255,215,0,0.3);
  }
  .myprizebox .mlbl { color: #CE93D8; font-size: 11px; margin-bottom: 4px; }
  .myprizebox .mval { color: #FFD700; font-size: 20px; font-weight: 900; text-shadow: 0 0 10px #FFD700; }
  .myprizebox .mlist { margin-top: 6px; }
  .myprizebox .mlist-item { color: #fff; font-size: 11px; padding: 1px 0; }
  .myprizebox .mlist-item:empty { display: none; }
  .myprizebox .mtotal-lbl { color: #CE93D8; font-size: 10px; margin-top: 6px; border-top: 1px solid rgba(255,215,0,0.3); padding-top: 4px; }

  /* Wheel */
  .wheel-wrapper { position: relative; width: 380px; height: 380px; }
  .pointer {
    position: absolute; top: -22px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 40px solid #FFD700;
    filter: drop-shadow(0 0 8px #FFD700) drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    animation: pointerGlow 1.5s ease-in-out infinite;
  }
  @keyframes pointerGlow {
    0%,100% { filter: drop-shadow(0 0 6px #FFD700); }
    50% { filter: drop-shadow(0 0 18px #FFD700) drop-shadow(0 0 30px #FFA500); }
  }
  canvas#wheel {
    border-radius: 50%;
    box-shadow: 0 0 0 10px #C0392B, 0 0 0 18px #FFD700, 0 0 0 24px #C0392B,
                0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,50,50,0.4);
    animation: wheelGlow 2s ease-in-out infinite;
  }
  @keyframes wheelGlow {
    0%,100% { box-shadow: 0 0 0 10px #C0392B, 0 0 0 18px #FFD700, 0 0 0 24px #C0392B, 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,50,50,0.3); }
    50%      { box-shadow: 0 0 0 10px #C0392B, 0 0 0 18px #FFD700, 0 0 0 24px #C0392B, 0 0 60px rgba(255,215,0,0.8), 0 0 100px rgba(255,100,50,0.6); }
  }
  .spin-btn {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90px; height: 90px; border-radius: 50%;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    border: 4px solid #fff; color: #8B0000;
    font-size: 14px; font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.5), 0 0 20px rgba(255,215,0,0.8);
    transition: all 0.15s;
    animation: btnPulse 1.5s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 20px rgba(255,215,0,0.6); }
    50%      { box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 40px rgba(255,215,0,1), 0 0 60px rgba(255,165,0,0.6); }
  }
  .spin-btn:hover:not(:disabled) { transform: translate(-50%,-50%) scale(1.1); animation: none; box-shadow: 0 6px 30px rgba(255,215,0,1); }
  .spin-btn:active:not(:disabled) { transform: translate(-50%,-50%) scale(0.95); }
  .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; animation: none; }

  /* Lights ring */
  .lights-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 400px; height: 400px;
    border-radius: 50%; pointer-events: none; z-index: -1;
  }
  .light-dot {
    position: absolute; width: 12px; height: 12px;
    border-radius: 50%; top: 50%; left: 50%;
  }

  /* Result popup */
  .result-popup {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center;
  }
  .result-popup.show { display: flex; }
  .result-card {
    background: linear-gradient(135deg, #8B0000, #C0392B);
    border: 4px solid #FFD700; border-radius: 20px;
    padding: 36px 48px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,215,0,0.4);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  @keyframes popIn { from{transform:scale(0.3) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;} }
  .result-card .congrats { color: #FFD700; font-size: 13px; letter-spacing: 2px; margin-bottom: 6px; }
  .result-card .prize-icon { font-size: 64px; margin-bottom: 8px; animation: iconBounce 0.6s ease; }
  @keyframes iconBounce { 0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);} }
  .result-card .prize-name { color: #fff; font-size: 22px; font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
  .result-card .spin-left { color: #FFD700; font-size: 13px; margin-bottom: 20px; }
  .close-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    border: none; border-radius: 30px; padding: 12px 36px;
    color: #8B0000; font-size: 16px; font-weight: 900;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 0 4px 15px rgba(255,215,0,0.4);
  }
  .close-btn:hover { transform: scale(1.05); box-shadow: 0 6px 25px rgba(255,215,0,0.7); }

  /* Decorations */
  .decorations { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .coin {
    position: absolute; width: 40px; height: 40px;
    background: radial-gradient(circle at 35% 35%, #FFE066, #FFA500);
    border-radius: 50%; border: 3px solid #CC8800;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #8B4513;
    animation: floatCoin 3s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
  }
  @keyframes floatCoin{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(15deg);}}
  .sparkle { position: absolute; font-size: 22px; animation: twinkle 2s ease-in-out infinite; }
  @keyframes twinkle{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.2;transform:scale(0.6);}}

  .no-spin-msg {
    color: #FFD700; font-size: 14px; font-weight: bold;
    text-align: center; background: rgba(139,0,0,0.7);
    border-radius: 8px; padding: 10px 20px; margin-top: 12px; display: none;
    border: 1px solid #FFD700; box-shadow: 0 0 20px rgba(255,215,0,0.3);
  }

  /* Prize table */
  .prize-list {
    background: rgba(100,0,0,0.6);
    border: 2px solid #FFD700; border-radius: 14px;
    padding: 16px 20px; margin-top: 22px;
    width: 100%; max-width: 540px;
    backdrop-filter: blur(4px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 30px rgba(255,215,0,0.1);
  }
  .prize-list h3 { color: #FFD700; font-size: 15px; text-align: center; margin-bottom: 12px; letter-spacing: 1px; text-shadow: 0 0 10px #FFD700; }
  .prize-table { width: 100%; border-collapse: collapse; }
  .prize-table tr:nth-child(even) td { background: rgba(255,255,255,0.06); }
  .prize-table td { color: #fff; padding: 7px 10px; font-size: 13px; vertical-align: middle; }
  .prize-table td:last-child { text-align: right; }
  .count-badge {
    display: inline-block;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 20px; padding: 2px 12px;
    color: #FFD700; font-weight: 700; font-size: 12px;
    min-width: 80px; text-align: center; transition: all 0.35s;
  }
  .count-badge.bump { background: rgba(255,215,0,0.45); transform: scale(1.18); box-shadow: 0 0 12px rgba(255,215,0,0.6); }
  .live-ticker {
    margin-top: 12px; background: rgba(0,0,0,0.35);
    border-radius: 8px; padding: 8px 14px;
    font-size: 12px; color: #ffe; text-align: center;
    border: 1px solid rgba(255,215,0,0.25);
    box-shadow: inset 0 0 10px rgba(255,215,0,0.05);
  }
  .live-ticker span { color: #FFD700; font-weight: bold; }

  /* Confetti */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    border-radius: 2px; opacity: 0;
    pointer-events: none; z-index: 300;
    animation: confettiFall 1.2s ease-in forwards;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(300px) rotate(720deg); }
  }
</style>
</head>
<body>
<div id="game-container">
  <div class="decorations">
    <div class="coin" style="top:8%;left:5%;animation-delay:0s">¥</div>
    <div class="coin" style="top:15%;right:6%;animation-delay:0.7s">¥</div>
    <div class="coin" style="bottom:18%;left:4%;animation-delay:1.2s">¥</div>
    <div class="coin" style="bottom:10%;right:5%;animation-delay:0.4s">¥</div>
    <div class="sparkle" style="top:5%;left:22%">✦</div>
    <div class="sparkle" style="top:10%;right:22%;animation-delay:0.5s">✦</div>
    <div class="sparkle" style="bottom:22%;left:18%;animation-delay:1s">✧</div>
    <div class="sparkle" style="bottom:28%;right:18%;animation-delay:1.5s">✦</div>
  </div>

  <div class="title-box">
    <h1>🎰 VÒNG QUAY MAY MẮN 🎰</h1>
    <div class="subtitle">Thời gian sự kiện: 2026/03/31 – 2026/04/30</div>
  </div>

  <div class="top-row">
    <!-- Chances -->
    <div class="chances-box">
      <span class="lbl">Bạn vẫn còn</span>
      <span class="num" id="chances">3</span>
      <span class="lbl2">Lần cơ hội</span>
    </div>

    <!-- Wheel -->
    <div class="wheel-wrapper">
      <div class="pointer"></div>
      <canvas id="wheel" width="360" height="360"></canvas>
      <button class="spin-btn" id="spinBtn" onclick="spin()">Bắt đầu</button>
    </div>

    <!-- My Prizes -->
    <div class="myprizebox">
      <div class="mlbl">🎁 Giải thưởng của tôi</div>
      <div class="mlist" id="myPrizeList">
        <div class="mlist-item" id="r1">—</div>
        <div class="mlist-item" id="r2">—</div>
        <div class="mlist-item" id="r3">—</div>
      </div>
      <div class="mtotal-lbl">Tổng nhận được</div>
      <div class="mval" id="totalVal">0 ₫</div>
    </div>
  </div>

  <div class="no-spin-msg" id="noSpinMsg">🎊 Bạn đã dùng hết 3 lượt! Cảm ơn bạn đã tham gia!</div>

  <div class="prize-list">
    <h3>🏆 BẢNG GIẢI THƯỞNG</h3>
    <table class="prize-table" id="prizeTable"></table>
    <div class="live-ticker" id="liveTicker">🔴 Đang tải hoạt động...</div>
  </div>
</div>

<!-- Result popup -->
<div class="result-popup" id="resultPopup">
  <div class="result-card">
    <div class="congrats">🎉 CHÚC MỪNG BẠN ĐÃ TRÚNG 🎉</div>
    <div class="prize-icon" id="prizeIcon">🎁</div>
    <div class="prize-name" id="prizeName">Giải thưởng</div>
    <div class="spin-left" id="spinLeftMsg"></div>
    <button class="close-btn" onclick="closeResult()">Nhận thưởng ✓</button>
  </div>
</div>

<script>
// ===================== DATA =====================
const prizes = [
  { name: "May mắn lần sau",   icon: "🍀", color: "#e74c3c", prob: 5,  baseCount: 3842, value: 0      },
  { name: "Xe máy SH 150i",    icon: "🛵", color: "#fff",    prob: 0,  baseCount: 2,    value: 0      },
  { name: "iPhone 16 Pro Max", icon: "📱", color: "#e74c3c", prob: 0,  baseCount: 5,    value: 0      },
  { name: "Xe máy Vision 2026",icon: "🏍️",color: "#fff",    prob: 0,  baseCount: 3,    value: 0      },
  { name: "Thưởng 500K",       icon: "💰", color: "#e74c3c", prob: 0,  baseCount: 18,   value: 500000 },
  { name: "Thưởng 200K",       icon: "💵", color: "#fff",    prob: 0,  baseCount: 47,   value: 200000 },
  { name: "Thưởng 100K",       icon: "💴", color: "#e74c3c", prob: 0,  baseCount: 124,  value: 100000 },
  { name: "Quà tặng đặc biệt", icon: "🎁", color: "#fff",    prob: 20, baseCount: 1563, value: 0      },
  { name: "May mắn lần sau",   icon: "🍀", color: "#e74c3c", prob: 5,  baseCount: 3791, value: 0      },
  { name: "Thưởng 350K",       icon: "💎", color: "#fff",    prob: 0,  baseCount: 29,   value: 350000 },
  { name: "Điểm thưởng 150K",  icon: "⭐", color: "#e74c3c", prob: 0,  baseCount: 83,   value: 150000 },
  { name: "Thưởng 50K",        icon: "🧧", color: "#fff",    prob: 70, baseCount: 5287, value: 50000  },
];

const fakeNames = ["Nguyễn V.A","Trần T.B","Lê M.C","Phạm T.D","Hoàng V.E","Đặng T.F","Vũ M.G","Bùi T.H","Đỗ V.I","Ngô T.K","Dương V.L","Lý T.M","Phan V.N","Võ T.O","Đinh M.P"];

const pool = [];
prizes.forEach((p,i) => { for(let j=0;j<p.prob;j++) pool.push(i); });
const liveCounts = prizes.map(p=>p.baseCount);

let chances = 3, spinning = false, currentAngle = 0;
let spinCount = 0;
let myPrizes = [];
let totalValue = 0;

// ===================== BUILD TABLE =====================
function buildTable() {
  const tbody = document.getElementById('prizeTable');
  tbody.innerHTML = '';
  prizes.forEach((p,i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${p.icon} ${p.name}</td><td><span class="count-badge" id="cnt-${i}">${liveCounts[i].toLocaleString('vi-VN')} người</span></td>`;
    tbody.appendChild(tr);
  });
}
buildTable();

// ===================== SOUND ENGINE (Web Audio API) =====================
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTick() {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.frequency.value = 800 + Math.random()*400;
  o.type = 'sine';
  g.gain.setValueAtTime(0.15, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.05);
  o.start(); o.stop(AC.currentTime + 0.05);
}

function playWin() {
  [523,659,784,1047].forEach((f,i) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.value = f; o.type = 'triangle';
    const t = AC.currentTime + i*0.15;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.4);
    o.start(t); o.stop(t+0.4);
  });
}

function playStart() {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, AC.currentTime);
  o.frequency.linearRampToValueAtTime(400, AC.currentTime+0.3);
  g.gain.setValueAtTime(0.2, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.3);
  o.start(); o.stop(AC.currentTime+0.3);
}

// ===================== WHEEL CANVAS =====================
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2, r=W/2-10;
const numSlices=prizes.length, sliceAngle=(2*Math.PI)/numSlices;

let lightPhase = 0;
function drawWheel(angle, isSpinning) {
  ctx.clearRect(0,0,W,H);
  lightPhase += isSpinning ? 0.18 : 0.04;

  // Glow ring behind wheel
  const grd = ctx.createRadialGradient(cx,cy,r-20,cx,cy,r+30);
  const gAlpha = 0.3 + 0.2*Math.sin(lightPhase);
  grd.addColorStop(0,'rgba(255,215,0,0)');
  grd.addColorStop(0.7,`rgba(255,165,0,${gAlpha})`);
  grd.addColorStop(1,'rgba(255,50,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r+30,0,2*Math.PI);
  ctx.fillStyle=grd; ctx.fill();

  // Slices
  for(let i=0;i<numSlices;i++){
    const start=angle+i*sliceAngle, end=start+sliceAngle;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle=prizes[i].color; ctx.fill();
    ctx.strokeStyle='#C0392B'; ctx.lineWidth=2; ctx.stroke();

    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start+sliceAngle/2);
    const textR=r*0.60;
    ctx.fillStyle=prizes[i].color==='#fff'?'#8B0000':'#fff';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 14px Arial';
    ctx.fillText(prizes[i].icon, textR, 0);
    ctx.save();
    ctx.translate(textR-18,0); ctx.rotate(Math.PI/2);
    ctx.font='bold 8px Arial';
    prizes[i].name.split(' ').slice(0,4).forEach((w,wi,arr)=>{
      ctx.fillText(w, 0, wi*10-(arr.length-1)*5);
    });
    ctx.restore();
    ctx.restore();
  }

  // Dividers
  for(let i=0;i<numSlices;i++){
    ctx.beginPath(); ctx.moveTo(cx,cy);
    const la=angle+i*sliceAngle;
    ctx.lineTo(cx+r*Math.cos(la),cy+r*Math.sin(la));
    ctx.strokeStyle='#C0392B'; ctx.lineWidth=2; ctx.stroke();
  }

  // Outer ring
  ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI);
  ctx.strokeStyle='#8B0000'; ctx.lineWidth=10; ctx.stroke();

  // Animated light dots on rim
  const dotCount=32;
  for(let i=0;i<dotCount;i++){
    const a=(2*Math.PI/dotCount)*i+angle;
    const lit=(Math.sin(lightPhase*2+i*0.8)>0);
    ctx.beginPath();
    ctx.arc(cx+(r-5)*Math.cos(a), cy+(r-5)*Math.sin(a), 6, 0, 2*Math.PI);
    if(lit){
      ctx.fillStyle='#FFD700';
      ctx.shadowColor='#FFD700';
      ctx.shadowBlur=isSpinning?16:8;
    } else {
      ctx.fillStyle='#fff';
      ctx.shadowColor='transparent';
      ctx.shadowBlur=0;
    }
    ctx.fill();
    ctx.shadowBlur=0;
  }

  // Center button bg
  const cgrd=ctx.createRadialGradient(cx-8,cy-8,4,cx,cy,48);
  cgrd.addColorStop(0,'#FFE066'); cgrd.addColorStop(1,'#FF8C00');
  ctx.beginPath(); ctx.arc(cx,cy,48,0,2*Math.PI);
  ctx.fillStyle=cgrd; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.stroke();
  if(isSpinning){
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(cx,cy,48,0,2*Math.PI);
    ctx.strokeStyle='rgba(255,215,0,0.8)'; ctx.lineWidth=3; ctx.stroke();
    ctx.shadowBlur=0;
  }
}
drawWheel(0, false);

// ===================== SPIN LOGIC =====================
let lastTickAngle = 0;
function pickWinner(){
  if(pool.length===0) return Math.floor(Math.random()*numSlices);
  return pool[Math.floor(Math.random()*pool.length)];
}

function spin(){
  if(spinning) return;
  if(chances<=0){ document.getElementById('noSpinMsg').style.display='block'; return; }
  if(AC.state==='suspended') AC.resume();
  playStart();

  spinning=true; chances--;
  document.getElementById('chances').textContent=chances;
  document.getElementById('spinBtn').disabled=true;

  const winnerIdx=pickWinner();
  const extra=6+Math.floor(Math.random()*4);
  const sliceMid=winnerIdx*sliceAngle+sliceAngle/2;
  const targetWheelAngle=(-Math.PI/2-sliceMid-extra*2*Math.PI);
  const nc=((currentAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const nt=((targetWheelAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  let delta=nt-nc; if(delta>0) delta-=2*Math.PI;
  const totalRotation=delta-extra*2*Math.PI;
  const startAngle=currentAngle;
  const duration=4500+Math.random()*1500;
  const startTime=performance.now();
  lastTickAngle=currentAngle;

  function easeOut(t){ return 1-Math.pow(1-t,4); }
  function animate(now){
    const elapsed=now-startTime;
    const progress=Math.min(elapsed/duration,1);
    currentAngle=startAngle+totalRotation*easeOut(progress);
    drawWheel(currentAngle, true);

    // Tick sound based on slice crossing
    const slicesCrossed=Math.floor(Math.abs(currentAngle-lastTickAngle)/sliceAngle);
    if(slicesCrossed>0){ playTick(); lastTickAngle=currentAngle; }

    if(progress<1){ requestAnimationFrame(animate); return; }

    spinning=false;
    drawWheel(currentAngle, false);
    document.getElementById('spinBtn').disabled=false;
    playWin();
    spawnConfetti();

    // Update count
    liveCounts[winnerIdx]++;
    const badge=document.getElementById('cnt-'+winnerIdx);
    if(badge){
      badge.textContent=liveCounts[winnerIdx].toLocaleString('vi-VN')+' người';
      badge.classList.add('bump');
      setTimeout(()=>badge.classList.remove('bump'),500);
    }

    // Update my prizes
    spinCount++;
    myPrizes.push(prizes[winnerIdx]);
    totalValue+=prizes[winnerIdx].value;
    updateMyPrizes();

    setTimeout(()=>{
      document.getElementById('prizeIcon').textContent=prizes[winnerIdx].icon;
      document.getElementById('prizeName').textContent=prizes[winnerIdx].name;
      const left=chances;
      document.getElementById('spinLeftMsg').textContent=
        left>0 ? `Bạn còn ${left} lượt quay!` : '🎊 Bạn đã dùng hết lượt!';
      document.getElementById('resultPopup').classList.add('show');
      if(chances===0) document.getElementById('noSpinMsg').style.display='block';
    },300);
  }
  requestAnimationFrame(animate);
}

// ===================== MY PRIZES =====================
function updateMyPrizes(){
  for(let i=0;i<3;i++){
    const el=document.getElementById('r'+(i+1));
    if(myPrizes[i]){
      el.textContent=myPrizes[i].icon+' '+myPrizes[i].name;
    }
  }
  const fmt=totalValue.toLocaleString('vi-VN');
  document.getElementById('totalVal').textContent=
    totalValue>0 ? fmt+' ₫' : '🎁 Phần quà';
}

// ===================== CONFETTI =====================
function spawnConfetti(){
  const colors=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD'];
  for(let i=0;i<40;i++){
    const div=document.createElement('div');
    div.className='confetti-piece';
    div.style.left=Math.random()*100+'vw';
    div.style.top=Math.random()*30+'vh';
    div.style.background=colors[Math.floor(Math.random()*colors.length)];
    div.style.animationDelay=Math.random()*0.5+'s';
    div.style.animationDuration=(0.8+Math.random()*0.8)+'s';
    div.style.transform=`rotate(${Math.random()*360}deg)`;
    div.style.width=div.style.height=(6+Math.random()*8)+'px';
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),1500);
  }
}

function closeResult(){ document.getElementById('resultPopup').classList.remove('show'); }

// ===================== AUTO INCREMENT =====================
function autoIncrement(){
  const updatePool=[];
  prizes.forEach((p,i)=>{ const w=p.prob>0?p.prob:1; for(let j=0;j<w;j++) updatePool.push(i); });
  const idx=updatePool[Math.floor(Math.random()*updatePool.length)];
  const add=Math.floor(Math.random()*3)+1;
  liveCounts[idx]+=add;
  const badge=document.getElementById('cnt-'+idx);
  if(badge){
    badge.textContent=liveCounts[idx].toLocaleString('vi-VN')+' người';
    badge.classList.add('bump');
    setTimeout(()=>badge.classList.remove('bump'),400);
  }
  const name=fakeNames[Math.floor(Math.random()*fakeNames.length)];
  const ticker=document.getElementById('liveTicker');
  ticker.innerHTML=`🔴 <span>${name}</span> vừa nhận <span>${prizes[idx].icon} ${prizes[idx].name}</span>`;
  setTimeout(autoIncrement, 2500+Math.random()*4000);
}
setTimeout(autoIncrement, 2000);

// Animate wheel glow loop even when idle
function idleLoop(){
  if(!spinning) drawWheel(currentAngle, false);
  requestAnimationFrame(idleLoop);
}
idleLoop();
</script>
